name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o agentexec-linux-amd64       ./cmd/agentexec/
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o agentexec-linux-arm64       ./cmd/agentexec/
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o agentexec-darwin-amd64      ./cmd/agentexec/
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o agentexec-darwin-arm64      ./cmd/agentexec/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            agentexec-linux-amd64
            agentexec-linux-arm64
            agentexec-darwin-amd64
            agentexec-darwin-arm64
